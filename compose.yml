services:
  db:
    image: mysql:8.0
    container_name: featzy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - featzy_data:/var/lib/mysql
    networks:
      - featzy_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      args:
        GITHUB_REPO: ${GITHUB_REPO}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        APP_ENV: production
    container_name: featzy_api
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - featzy_network

  front:
    build:
      context: ./front
      args:
        GITHUB_REPO: ${GITHUB_REPO}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        VITE_API_URL: /api
    container_name: featzy_front
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - featzy_network

networks:
  featzy_network:
    driver: bridge

volumes:
  featzy_data:
